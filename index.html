<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barcos del exilio — ArcGIS</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/dark/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1208;
      --parchment: #f5f0e8;
      --parchment-dark: #e8e0cc;
      --gold: #c4922a;
      --muted: #6b5e4a;
      --border: #c8b89a;
    }
    html, body, #viewDiv { height: 100%; margin: 0; padding: 0; }
    body { font-family: "Source Serif 4", Georgia, serif; overflow: hidden; }
    header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 2;
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; background: rgba(26, 18, 8, 0.92);
      border-bottom: 1px solid rgba(196, 146, 42, 0.35);
      pointer-events: none;
    }
    header button, header .legend-item { pointer-events: auto; }
    header h1 {
      font-family: "Playfair Display", serif; font-size: 1.1rem; color: var(--parchment);
      margin: 0; font-weight: 600;
    }
    header .subtitle { font-size: 0.65rem; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; font-style: italic; }
    .legend { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .legend-item {
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      padding: 4px 10px; border-radius: 3px; border: 1px solid transparent; background: transparent;
      color: var(--parchment); font-size: 0.72rem; font-style: italic; font-family: inherit;
    }
    .legend-item:hover { border-color: rgba(196, 146, 42, 0.35); }
    .legend-item.active { border-color: rgba(196, 146, 42, 0.55); background: rgba(196, 146, 42, 0.08); }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    #viewDiv { position: absolute; top: 56px; left: 0; right: 380px; bottom: 0; }
    @media (max-width: 900px) {
      #viewDiv { right: 0; }
      .side-panel { width: 100% !important; max-height: 45vh; top: auto !important; bottom: 0; right: 0; border-left: none; border-top: 1px solid var(--border); }
    }
    .side-panel {
      position: absolute; top: 56px; right: 0; bottom: 0; width: 380px;
      background: var(--parchment); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 2; box-shadow: -4px 0 24px rgba(0,0,0,0.12);
    }
    .side-panel.collapsed { width: 0 !important; border: none; overflow: hidden; }
    .panel-toggle {
      position: absolute; left: -26px; top: 50%; transform: translateY(-50%);
      width: 26px; height: 44px; background: var(--parchment); border: 1px solid var(--border);
      border-right: none; border-radius: 4px 0 0 4px; cursor: pointer; font-size: 0.65rem; color: var(--muted); z-index: 3;
    }
    .panel-header { background: var(--ink); padding: 14px 18px; flex-shrink: 0; }
    .panel-tag { display: inline-block; font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 2px 8px; border-radius: 2px; margin-bottom: 6px; }
    .panel-name { font-family: "Playfair Display", serif; font-size: 1.25rem; color: var(--parchment); margin: 0 0 4px; }
    .panel-dates { font-size: 0.72rem; color: rgba(245,240,232,0.65); font-style: italic; margin: 0; }
    .panel-body { flex: 1; overflow-y: auto; padding: 14px 16px; font-size: 0.84rem; line-height: 1.65; color: var(--ink); }
    .ship-section {
      border: 1px solid var(--parchment-dark); border-radius: 4px; margin-bottom: 8px;
      background: rgba(255,255,255,0.65);
    }
    .ship-section > summary {
      cursor: pointer; list-style: none; font-family: "Playfair Display", serif;
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em; color: var(--ink);
      padding: 10px 12px; user-select: none;
    }
    .ship-section > summary::-webkit-details-marker { display: none; }
    .ship-section > summary::before {
      content: "▸ "; color: var(--gold); font-size: 0.7rem;
    }
    .ship-section[open] > summary::before { content: "▾ "; }
    .ship-section-inner { padding: 0 12px 12px; border-top: 1px solid var(--parchment-dark); }
    .stat { display: flex; justify-content: space-between; gap: 12px; padding: 5px 0; border-bottom: 1px solid var(--parchment-dark); font-size: 0.8rem; }
    .stat span:first-child { color: var(--muted); font-style: italic; }
    .tl { display: flex; gap: 10px; margin-bottom: 12px; }
    .tl-dot { width: 10px; height: 10px; border: 2px solid var(--border); border-radius: 50%; margin-top: 4px; flex-shrink: 0; background: #fff; }
    .tl-date { font-size: 0.68rem; color: var(--muted); font-style: italic; }
    .person { background: #fff; border: 1px solid var(--parchment-dark); border-radius: 4px; padding: 12px; margin-bottom: 10px; }
    .person h4 { font-family: "Playfair Display", serif; margin: 0 0 4px; font-size: 0.95rem; }
    .person .role { font-size: 0.72rem; color: var(--muted); font-style: italic; margin-bottom: 6px; }
    .person .img-grid { margin: 8px 0 12px; }
    .pdf-text { white-space: pre-line; }
    .img-grid { display: flex; flex-direction: column; gap: 12px; }
    .img-grid figure { margin: 0; }
    .img-grid img { max-width: 100%; height: auto; border-radius: 3px; border: 1px solid var(--border); }
    .img-grid figcaption { font-size: 0.72rem; color: var(--muted); margin-top: 4px; font-style: italic; }
    .empty { text-align: center; color: var(--muted); font-style: italic; padding: 32px 16px; }
    .warn {
      position: absolute; bottom: 16px; left: 16px; z-index: 5; max-width: 360px;
      background: rgba(40, 28, 18, 0.94); color: var(--parchment); padding: 12px 14px; font-size: 0.78rem; line-height: 1.45;
      border-radius: 4px; border-left: 3px solid var(--gold);
    }
    .warn a { color: var(--gold); }
    /* Compact map attribution (OSM/CARTO + Esri API requirement) */
    .esri-ui .esri-attribution {
      font-size: 10px;
      line-height: 1.35;
      max-width: min(92%, 28rem);
      background: rgba(26, 18, 8, 0.82) !important;
      color: rgba(245, 240, 232, 0.78) !important;
      padding: 4px 8px !important;
      border-radius: 2px;
    }
    .esri-ui .esri-attribution a { color: var(--gold) !important; }
  </style>
  <script src="config.js"></script>
  <script type="importmap">
    {
      "imports": {
        "@arcgis/core/": "https://js.arcgis.com/4.29/@arcgis/core/"
      }
    }
  </script>
</head>
<body>
  <header>
    <div>
      <h1>Barcos del exilio</h1>
      <div class="subtitle">Rutas de refugiados — Guerra Civil</div>
    </div>
    <div class="legend" id="legend"></div>
  </header>
  <div id="viewDiv"></div>
  <div class="side-panel" id="sidePanel">
    <button type="button" class="panel-toggle" id="panelToggle" aria-label="Mostrar u ocultar panel">▶</button>
    <div class="panel-header">
      <span class="panel-tag" id="panelTag" style="background: rgba(196,146,42,0.2); color: #b07a18;">Elija un barco</span>
      <h2 class="panel-name" id="panelName">Barcos del exilio</h2>
      <p class="panel-dates" id="panelDates">1937–1939</p>
    </div>
    <div class="panel-body" id="panelBody">
      <p class="empty">Pulse una ruta o un puerto. Las líneas y puntos vienen de <strong>ArcGIS Online</strong> (capas alojadas). Los textos vienen de <code>ships.json</code>. Despliegue cada sección para leer.</p>
    </div>
  </div>
  <div class="warn" id="configWarn" hidden></div>

  <script type="module">
    import Map from "@arcgis/core/Map.js";
    import MapView from "@arcgis/core/views/MapView.js";
    import Basemap from "@arcgis/core/Basemap.js";
    import WebTileLayer from "@arcgis/core/layers/WebTileLayer.js";
    import FeatureLayer from "@arcgis/core/layers/FeatureLayer.js";
    import UniqueValueRenderer from "@arcgis/core/renderers/UniqueValueRenderer.js";
    import SimpleLineSymbol from "@arcgis/core/symbols/SimpleLineSymbol.js";
    import SimpleMarkerSymbol from "@arcgis/core/symbols/SimpleMarkerSymbol.js";
    import PopupTemplate from "@arcgis/core/PopupTemplate.js";

    const cfg = window.SHIPS_OF_EXILE_CONFIG || {};
    const warnEl = document.getElementById("configWarn");

    const esc = (s) =>
      String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");

    function figureHtml(im) {
      const cap = im.caption || "";
      const src = encodeURI(im.src);
      return `<figure><img src="${src}" alt="${esc(cap)}" loading="lazy" /><figcaption>${esc(cap)}</figcaption></figure>`;
    }

    function figuresGrid(arr) {
      if (!arr?.length) return "";
      return `<div class="img-grid">${arr.map(figureHtml).join("")}</div>`;
    }

    /** Dark basemap — OpenStreetMap + CARTO. No Esri Developer API key. */
    const cartoDark = new WebTileLayer({
      urlTemplate: "https://{subDomain}.basemaps.cartocdn.com/rastertiles/dark_all/{level}/{col}/{row}.png",
      subDomains: ["a", "b", "c", "d"],
      copyright:
        '<a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, © CARTO',
    });

    const basemapNoKey = new Basemap({
      baseLayers: [cartoDark],
      title: "Oscuro (OSM/CARTO)",
    });

    if (!cfg.routesLayerUrl || !cfg.portsLayerUrl) {
      warnEl.hidden = false;
      warnEl.innerHTML =
        "Defina <code>routesLayerUrl</code> y <code>portsLayerUrl</code> en <code>config.js</code>.";
    }

    /**
     * FeatureLayer must use the layer endpoint …/FeatureServer/0 (not …/FeatureServer alone).
     * If the URL stops at FeatureServer, read ?f=json and append the first layer id.
     */
    async function resolveFeatureLayerUrl(raw) {
      if (!raw || typeof raw !== "string") return raw;
      let u = raw.trim().replace(/\/+$/, "");
      if (/\/FeatureServer\/\d+$/i.test(u)) return u;
      if (!/\/FeatureServer$/i.test(u)) return u;
      try {
        const res = await fetch(`${u}?f=json`);
        const json = await res.json();
        if (json.error) {
          return `${u}/0`;
        }
        const layers = json.layers || [];
        if (layers.length > 0) {
          return `${u}/${layers[0].id}`;
        }
      } catch (_) {
        /* network / CORS e.g. file:// */
      }
      return `${u}/0`;
    }

    const routesLayerUrlResolved = await resolveFeatureLayerUrl(cfg.routesLayerUrl);
    const portsLayerUrlResolved = await resolveFeatureLayerUrl(cfg.portsLayerUrl);

    /** ArcGIS REST returns code 499 "Token Required" when the layer is not shared with Everyone. */
    async function layerAllowsAnonymousAccess(url) {
      if (!url) return { ok: false };
      try {
        const res = await fetch(`${url}?f=json`);
        const json = await res.json();
        if (json.error && (json.error.code === 499 || /token/i.test(String(json.error.message || "")))) {
          return { ok: false, code: json.error.code };
        }
      } catch (_) {
        return { ok: true };
      }
      return { ok: true };
    }

    const portsAccess = await layerAllowsAnonymousAccess(portsLayerUrlResolved);
    const routesAccess = await layerAllowsAnonymousAccess(routesLayerUrlResolved);

    if (routesLayerUrlResolved && !routesAccess.ok) {
      warnEl.hidden = false;
      warnEl.innerHTML +=
        "<br><br><strong>Rutas:</strong> el servicio exige inicio de sesión (código 499). En ArcGIS Online: abra el elemento de la capa → <strong>Compartir</strong> → <strong>Todos (público)</strong>.";
    }
    if (portsLayerUrlResolved && !portsAccess.ok) {
      warnEl.hidden = false;
      warnEl.innerHTML +=
        "<br><br><strong>Puertos:</strong> el servidor respondió <code>Token Required (499)</code>: la capa <strong>no está visible sin cuenta</strong>. No es un fallo del código. En ArcGIS Online → su capa <strong>ports</strong> → <strong>Compartir</strong> → marque <strong>Todos (público)</strong> (o su equivalente). Guarde y recargue esta página. Mientras tanto solo se dibujan las rutas.";
    }

    const shipColors = {
      mexique: "#8b3a1e",
      sinaia: "#c4922a",
      winnipeg: "#2a6b6e",
      habana: "#4a6fa5",
    };

    const routeRenderer = new UniqueValueRenderer({
      field: "ship_key",
      uniqueValueInfos: Object.entries(shipColors).map(([value, color]) => ({
        value,
        symbol: new SimpleLineSymbol({
          color,
          width: 2.5,
          cap: "round",
          join: "round",
          style: "dash",
        }),
      })),
      defaultSymbol: new SimpleLineSymbol({ color: "#cccccc", width: 2, style: "dash" }),
      defaultLabel: "Ruta",
    });

    const portRenderer = new UniqueValueRenderer({
      field: "ship_key",
      uniqueValueInfos: Object.entries(shipColors).map(([value, color]) => ({
        value,
        symbol: new SimpleMarkerSymbol({
          style: "circle",
          color,
          size: 10,
          outline: { color: "rgba(245,240,232,0.9)", width: 1.5 },
        }),
      })),
      defaultSymbol: new SimpleMarkerSymbol({
        style: "circle",
        color: "#aaa",
        size: 9,
        outline: { color: "#fff", width: 1 },
      }),
    });

    const routesLayer =
      routesLayerUrlResolved && routesAccess.ok
        ? new FeatureLayer({
            url: routesLayerUrlResolved,
            renderer: routeRenderer,
            popupEnabled: false,
          })
        : null;

    const portsPopup = new PopupTemplate({
      title: "{name}",
      content: [
        {
          type: "fields",
          fieldInfos: [
            { fieldName: "ship_name", label: "Barco" },
            { fieldName: "port_type", label: "Tipo" },
            { fieldName: "description", label: "Descripción" },
          ],
        },
      ],
    });

    const portsLayer =
      portsLayerUrlResolved && portsAccess.ok
        ? new FeatureLayer({
            url: portsLayerUrlResolved,
            renderer: portRenderer,
            popupTemplate: portsPopup,
          })
        : null;

    if (routesLayer) {
      routesLayer.load().catch((err) => {
        warnEl.hidden = false;
        warnEl.innerHTML += `<br><br><strong>Rutas:</strong> error al cargar la capa. ${esc(String(err.message || err))}`;
      });
    }
    if (portsLayer) {
      portsLayer.load().catch((err) => {
        warnEl.hidden = false;
        warnEl.innerHTML += `<br><br><strong>Puertos:</strong> error al cargar. ${esc(String(err.message || err))}`;
      });
    }

    const map = new Map({
      basemap: basemapNoKey,
      layers: [routesLayer, portsLayer].filter(Boolean),
    });

    const view = new MapView({
      container: "viewDiv",
      map,
      center: [-30, 25],
      zoom: 3,
      constraints: { minZoom: 2 },
      popup: { dockEnabled: true, dockOptions: { position: "bottom-left" } },
    });

    let shipsData = {};
    async function loadShipsData() {
      try {
        const mod = await import("./ships.json", { with: { type: "json" } });
        if (mod?.default && typeof mod.default === "object") return mod.default;
      } catch (_) {
        /* Older Chromium used `assert` instead of `with` */
      }
      try {
        const mod = await import("./ships.json", { assert: { type: "json" } });
        if (mod?.default && typeof mod.default === "object") return mod.default;
      } catch (_) {
        /* JSON module import unsupported or blocked */
      }
      try {
        const res = await fetch(new URL("./ships.json", import.meta.url));
        if (res.ok) return await res.json();
      } catch (_) {}
      return {};
    }
    shipsData = await loadShipsData();
    if (!Object.keys(shipsData).length) {
      warnEl.hidden = false;
      warnEl.innerHTML +=
        "<br><br><strong>Textos del panel:</strong> no se pudo cargar <code>ships.json</code>. Los navegadores suelen bloquear <code>fetch</code> con archivos <code>file://</code>. Abra el sitio con un servidor local (por ejemplo, en la carpeta <code>web</code>: <code>python3 -m http.server 8080</code>) y visite <code>http://localhost:8080</code>.";
    }

    function wrapSection(title, innerHtml, open) {
      return `<details class="ship-section" ${open ? "open" : ""}>
        <summary>${esc(title)}</summary>
        <div class="ship-section-inner">${innerHtml}</div>
      </details>`;
    }

    const legendEl = document.getElementById("legend");
    const shipOrder = ["mexique", "sinaia", "winnipeg", "habana"];
    shipOrder.forEach((key) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "legend-item active";
      btn.dataset.ship = key;
      const dot = document.createElement("span");
      dot.className = "dot";
      dot.style.background = shipColors[key];
      btn.appendChild(dot);
      btn.appendChild(document.createTextNode(shipsData[key]?.name || key));
      btn.addEventListener("click", () => focusShip(key));
      legendEl.appendChild(btn);
    });

    renderShipPanel(shipOrder[0]);

    function renderShipPanel(key) {
      const ship = shipsData[key];
      const tag = document.getElementById("panelTag");
      const nameEl = document.getElementById("panelName");
      const datesEl = document.getElementById("panelDates");
      const body = document.getElementById("panelBody");
      if (!ship) {
        body.innerHTML = `<p class="empty">No hay entrada en ships.json para <strong>${esc(key)}</strong>.</p>`;
        return;
      }
      tag.textContent = ship.name;
      tag.style.background = `${ship.color}22`;
      tag.style.color = ship.color;
      nameEl.textContent = ship.name;
      datesEl.textContent = ship.dates || "";
      const H = ship.headings || {};
      const parts = [];
      let n = 0;
      const nextOpen = () => n++ === 0;

      if (ship.images?.length) {
        parts.push(wrapSection("Imágenes", figuresGrid(ship.images), false));
      }
      if (ship.summary) {
        let sumInner = `<p class="pdf-text">${esc(ship.summary)}</p>${figuresGrid(ship.summary_images)}`;
        parts.push(wrapSection(H.summary || ship.name, sumInner, nextOpen()));
      }
      if (ship.stats?.length) {
        let inner = "";
        ship.stats.forEach((s) => {
          inner += `<div class="stat"><span>${esc(s.label)}</span><span>${esc(s.value)}</span></div>`;
        });
        parts.push(wrapSection(H.stats || "Datos", inner, nextOpen()));
      }
      if (ship.timeline?.length) {
        const tTitle = H.timeline || ship.timeline_title || "Cronología del viaje";
        let inner = "";
        ship.timeline.forEach((t) => {
          inner += `<div class="tl"><div class="tl-dot"></div><div><div class="tl-date">${esc(t.date)}</div><div class="pdf-text">${esc(t.event)}</div></div></div>`;
        });
        parts.push(wrapSection(tTitle, inner, false));
      }
      if (ship.conditions) {
        parts.push(
          wrapSection(
            H.conditions || "Condiciones del viaje",
            `<p class="pdf-text">${esc(ship.conditions)}</p>`,
            false
          )
        );
      }
      if (ship.onboard_newspaper) {
        let obInner = `<p class="pdf-text">${esc(ship.onboard_newspaper)}</p>${figuresGrid(ship.onboard_newspaper_images)}`;
        parts.push(wrapSection(H.onboard_newspaper || "Prensa a bordo", obInner, false));
      }
      if (ship.ship_history) {
        let histInner = `<p class="pdf-text">${esc(ship.ship_history)}</p>${figuresGrid(ship.ship_history_images)}`;
        parts.push(wrapSection(H.ship_history || "Historia del barco", histInner, false));
      }
      if (ship.neruda) {
        let nerInner = `<p class="pdf-text">${esc(ship.neruda)}</p>${figuresGrid(ship.neruda_images)}`;
        parts.push(wrapSection(H.neruda || "El papel de Pablo Neruda", nerInner, false));
      }
      if (ship.people?.length) {
        let inner = "";
        ship.people.forEach((p) => {
          const roleHtml = p.role ? `<div class="role">${esc(p.role)}</div>` : "";
          const picHtml = p.image?.src ? figuresGrid([p.image]) : "";
          inner += `<div class="person"><h4>${esc(p.name)}</h4>${roleHtml}${picHtml}<p class="pdf-text">${esc(p.bio)}</p></div>`;
        });
        parts.push(wrapSection(H.people || "Refugiados relevantes", inner, false));
      }
      if (ship.obras_citadas) {
        parts.push(
          wrapSection(
            H.obras_citadas || "Recursos externos",
            `<p class="pdf-text">${esc(ship.obras_citadas)}</p>`,
            false
          )
        );
      }
      body.innerHTML = parts.join("");
      document.querySelectorAll(".legend-item").forEach((el) => {
        el.classList.toggle("active", el.dataset.ship === key);
      });
    }

    async function focusShip(key) {
      renderShipPanel(key);
      if (!routesLayer) return;
      const q = routesLayer.createQuery();
      q.where = `ship_key = '${key}'`;
      q.returnGeometry = true;
      const res = await routesLayer.queryFeatures(q);
      const geom = res.features[0]?.geometry;
      if (!geom) return;
      const ext = geom.extent;
      const target =
        ext && ext.width > 0 && ext.height > 0 ? ext.expand(1.35) : geom;
      view.goTo(target, { duration: 800 }).catch(() => {});
    }

    view.on("click", async (event) => {
      const layers = [routesLayer, portsLayer].filter(Boolean);
      const hit = await view.hitTest(event, layers.length ? { include: layers } : undefined);
      if (!hit.results.length) return;
      const g = hit.results[0];
      const attr = g.graphic.attributes || {};
      if (attr.ship_key) {
        renderShipPanel(attr.ship_key);
        document.getElementById("sidePanel").classList.remove("collapsed");
        document.getElementById("panelToggle").textContent = "▶";
      }
    });

    document.getElementById("panelToggle").addEventListener("click", () => {
      const p = document.getElementById("sidePanel");
      const collapsed = p.classList.toggle("collapsed");
      document.getElementById("panelToggle").textContent = collapsed ? "◀" : "▶";
    });
  </script>
</body>
</html>
